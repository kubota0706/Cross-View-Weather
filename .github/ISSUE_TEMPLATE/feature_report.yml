name: 🚀 新機能開発・タスク (Feature)
description: 新しい機能の開発やタスクのイシューを作成します。
title: "[feat]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 新機能開発テンプレート
        Issueを作成していただきありがとうございます。開発の目的やタスクの明確化のため、以下の項目への入力をお願いします。

  - type: textarea
    id: summary
    attributes:
      label: 📝 概要
      description: 何を開発するのか、簡潔に記述してください。
      placeholder: |
        例：AIモデルの学習および検証に使用するため、地上画像データの収集用スクリプトの開発を行います。
        淀川河川事務所のライブカメラから画像をスクレイピングし、重複を防ぎつつエラーログを残す基本機能を実装します。
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 🎯 目的・なぜやるのか
      description: この開発を行う背景や、得られるメリットを記述してください。
      placeholder: |
        - 地上カメラ等から定期的に空や景色の画像データを取得し、自動で蓄積する仕組みを作るため。
        - AIモデルを作るためのデータ基盤を得るため。
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ やること（タスクリスト）
      description: 開発に必要なステップをチェックボックス形式で記述してください（作成後、画面上でチェック可能です）。
      value: |
        - [ ] 国土交通省 近畿地方整備局 淀川河川事務所 ライブカメラからの画像取得ロジック実装
        - [ ] 取得した画像の保存ディレクトリ構造の定義（`images/<area ID>/` への保存など）
        - [ ] 例外処理（ネットワークエラー等）時のログ出力機能の実装
        - [ ] 保存済みの画像との重複を検知し、無駄なアクセスを減らすロジックの実装
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: 🧪 確認方法（テスト方法の想定）
      description: 実装完了後、どのように動作確認を行う予定か記述してください。
      value: |
        - [ ] `python image_download.py` を実行し、画像が正しく保存されること
        - [ ] 2回目以降の実行で、重複する画像がスキップされること
        - [ ] エラーログ（`download_error.log`）が生成されること
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: 🔗 親イシュー（任意）
      description: このタスクが特定の大枠（親イシュー）に属する場合、そのIssue番号を記述してください。
      placeholder: "#1"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 📌 備考 / 関連情報
      description: 注意点、参考URL、あるいは開発の進め方に関するメモがあれば記述してください。
      placeholder: |
        例：一通りエラーが出ずに一区切りつく段階まで一気に実装する予定です。
        ※プルリクエストの命名規則などのドキュメント追記もこのタスク内で合わせて行う可能性があります。
    validations:
      required: false